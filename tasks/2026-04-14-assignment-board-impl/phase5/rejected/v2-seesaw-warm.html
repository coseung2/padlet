<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>v2 — Seesaw Warm</title>
<style>
  :root{
    --color-bg:#fdf7ee; --color-surface:#fff; --color-surface-alt:#f4ece0;
    --color-text:rgba(0,0,0,.92); --color-text-muted:#8a7a5a;
    --color-accent:#ff8a3d;
    --radius-card:18px; --radius-pill:9999px;
    font-family:Inter,system-ui,sans-serif;
  }
  body{background:var(--color-bg);color:var(--color-text);margin:0;padding:24px}
  .board-header{font-size:28px;font-weight:800;margin-bottom:10px;color:#5b3e10}
  .guide{background:#fff7e6;border:2px solid #f4d48b;border-radius:var(--radius-card);padding:18px 22px;margin-bottom:22px;max-width:960px}
  .guide-label{font-size:12px;font-weight:700;color:#b4892b;margin-bottom:6px;letter-spacing:.1px}
  .guide-body{font-size:15px;line-height:1.55}
  .grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px;max-width:960px}
  .slot{background:var(--color-surface);border-radius:var(--radius-card);padding:12px;display:flex;flex-direction:column;gap:10px;box-shadow:0 2px 6px rgba(120,80,20,.08);cursor:pointer;transition:transform 120ms}
  .slot:hover{transform:translateY(-2px)}
  .thumb{aspect-ratio:4/3;border-radius:14px;background:var(--color-surface-alt);display:flex;align-items:center;justify-content:center;color:#c0a878;font-size:28px;font-weight:800}
  .thumb.has-img{background:linear-gradient(135deg,#ffd59e,#ffb26a);color:#7a3d0d;font-size:12px}
  .name{font-size:14px;font-weight:700}
  .num{font-size:11px;color:var(--color-text-muted);font-weight:700}
  .pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--radius-pill);font-size:12px;font-weight:700}
  .pill--sub{background:#e0f0ff;color:#1565c0}
  .pill--rev{background:#dcf0df;color:#2e7d32}
  .pill--ret{background:#ffd7d7;color:#c62828}
  .pill--ass{background:#f4ece0;color:#8a7a5a}
  .row{display:flex;justify-content:space-between;align-items:center}
</style></head>
<body>
  <div class="board-header">🌸 3월 독서 감상문</div>
  <div class="guide">
    <div class="guide-label">📖 안내</div>
    <div class="guide-body">각자 읽은 책 중 가장 인상 깊었던 한 권을 골라 감상문을 작성해 주세요!</div>
  </div>
  <div class="grid">
    <div class="slot"><div class="thumb has-img">사진</div><div class="row"><span class="name">김철수</span><span class="num">1</span></div><span class="pill pill--rev">✓ 확인됨</span></div>
    <div class="slot"><div class="thumb has-img">글</div><div class="row"><span class="name">이영희</span><span class="num">2</span></div><span class="pill pill--sub">제출 완료</span></div>
    <div class="slot"><div class="thumb has-img">사진</div><div class="row"><span class="name">박민수</span><span class="num">3</span></div><span class="pill pill--ret">! 반려</span></div>
    <div class="slot"><div class="thumb">4</div><div class="row"><span class="name">최지우</span><span class="num">4</span></div><span class="pill pill--ass">아직</span></div>
    <div class="slot"><div class="thumb has-img">글</div><div class="row"><span class="name">정다은</span><span class="num">5</span></div><span class="pill pill--sub">제출 완료</span></div>
    <div class="slot"><div class="thumb">6</div><div class="row"><span class="name">강현우</span><span class="num">6</span></div><span class="pill pill--ass">아직</span></div>
    <div class="slot"><div class="thumb has-img">사진</div><div class="row"><span class="name">윤서연</span><span class="num">7</span></div><span class="pill pill--rev">✓ 확인됨</span></div>
    <div class="slot"><div class="thumb">8</div><div class="row"><span class="name">장민호</span><span class="num">8</span></div><span class="pill pill--ass">아직</span></div>
    <div class="slot"><div class="thumb has-img">글</div><div class="row"><span class="name">오하늘</span><span class="num">9</span></div><span class="pill pill--sub">제출 완료</span></div>
  </div>
</body></html>
