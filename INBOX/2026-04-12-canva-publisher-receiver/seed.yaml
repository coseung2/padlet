goal: Implement POST /api/external/cards receiver endpoint and PAT (Personal Access
  Token) system for Canva Content Publisher integration in Aura-board — enabling teachers
  to publish Canva designs as cards to their boards via a Pro-tier-gated, rate-limited,
  streaming-upload API secured by prefix-based PAT authentication
task_type: code
brownfield_context:
  project_type: brownfield
  context_references:
  - path: aura-canva-app/src/intents/content_publisher/index.tsx
    role: primary
    summary: Canva app client contract — sends {boardId,title,imageDataUrl,sectionId?}
      payload and expects 200 {id,url} response with Toast + externalUrl link
  - path: padlet/
    role: reference
    summary: Aura-board Next.js App Router codebase — ExternalAccessToken entity,
      board/card schema, teacher settings UI patterns (read-only)
  existing_patterns:
  - ExternalAccessToken entity extension (no new tables)
  - 'Zod strict schema validation with unified { error: { code, message } } error
    envelope'
  - 'Upstash Redis sliding window rate limiting (3-axis: token/teacher/IP)'
  - Next.js App Router route handlers at /api/external/*
  - Teacher settings UI under /(teacher)/settings/
  - Vercel Blob put() for image storage
  existing_dependencies:
  - '@vercel/blob (image storage, streaming multipart)'
  - Upstash Redis (rate limiting sliding window)
  - zod (request validation strict mode)
  - Next.js App Router (runtime)
  - Prisma (ExternalAccessToken model extension)
  - SHA-256 via Node.js crypto (PAT hashing)
constraints:
- Next.js App Router + Node.js runtime only
- Vercel Blob for image storage (S3 deferred to Enterprise v2+)
- Request body hard limit 4.0MB (413 early guard, Vercel ceiling 4.5MB)
- No new DB entities — extend existing ExternalAccessToken only
- PAT format aurapat_{8char_base62_id}_{40char_secret}, hash = SHA-256(secret‖PEPPER)
- cards:write scope restricted to Pro tier (Free → 402 Payment Required + upgrade
  link)
- 'Rate limits: per-token 60/min, per-teacher 300/hour, per-IP 300/min via Upstash
  Redis sliding window'
- Zod strict schema — unknown fields rejected 422
- p95 upload latency < 2000ms (streaming, no full-body buffer)
- Token secret shown exactly once at issuance, no recovery on loss
- 'Legacy ExternalAccessToken migration: 3-stage (nullable tokenPrefix → revoke+notify
  → NOT NULL)'
- 'v1 scope system: cards:write only (scopes String[] field retained for v2 expansion)'
- CRC32 checksum deferred to v1.1
- sectionId optional in v1 (section dropdown UI deferred to v2)
acceptance_criteria:
- 'POST /api/external/cards validates Zod strict body { boardId: cuid, title: string(1–200),
  imageDataUrl: data:image/png;base64, sectionId?: cuid'
- null }
- 'Returns 200 OK { id: Card.cuid, url: "https://aura-board-app.vercel.app/board/<slug>#c/<cardId>"
  } on success'
- 'Returns { error: { code, message } } for all error cases'
- PAT resolved via tokenPrefix (8-char) DB lookup then SHA-256(secret‖PEPPER) verification
- boardId validated against token.scopeBoardIds allowlist (empty array = all teacher
  boards allowed)
- Image uploaded to Vercel Blob via streaming/multipart (no full buffer), p95 < 2000ms
- Rate limit 429 + Retry-After header on exceed
- Free-tier token on cards:write → 402 + upgrade link
- Request > 4.0MB → 413 before body parse
- Token issuance UI at /(teacher)/settings/external-tokens, Galaxy Tab S6 Lite optimized
- 'Token reveal modal: one-time display with Copy + Download(.txt) buttons'
- 'Token expiry dropdown: 1d / 30d / 90d(default) / 365d / unlimited with "Recommended:
  90-day rotation" guidance'
- Legacy tokens revoked in 3-stage migration with reissuance notice
- 'Card defaults: width=240, height=160, content="", authorId=tokenOwner.id, sectionId=body.sectionId
  ?? null'
- Unknown request fields rejected with 422 invalid_data_url code
ontology_schema:
  name: CanvaPublisherPAT
  description: Domain model for the Canva Content Publisher PAT authentication system
    and card creation pipeline — covering token lifecycle, board authorization scope,
    image ingestion, and card entity defaults
  fields:
  - name: tokenId
    type: string
    description: CUID primary key for ExternalAccessToken
    required: true
  - name: tokenPrefix
    type: string
    description: 8-char base62 prefix for O(1) DB lookup, unique, NOT NULL after migration
    required: true
  - name: tokenHash
    type: string
    description: SHA-256(secret‖PEPPER) stored credential, never plaintext
    required: true
  - name: tokenSecret
    type: string
    description: Raw 40-char secret in aurapat_{id}_{secret} format — shown once at
      issuance only
    required: true
  - name: scopes
    type: array
    description: Granted permission scope strings (v1 fixed to ['cards:write'])
    required: true
  - name: scopeBoardIds
    type: array
    description: Allowlist of permitted boardId CUIDs (empty = all teacher-owned boards)
    required: true
  - name: expiresAt
    type: string
    description: ISO datetime of expiry, null = unlimited
    required: true
  - name: teacherId
    type: string
    description: Owner teacher user CUID (authorId for created cards)
    required: true
  - name: boardId
    type: string
    description: Target board CUID sent in request body, validated against scopeBoardIds
    required: true
  - name: title
    type: string
    description: Card title 1–200 chars, auto-injected by aura-canva-app from Canva
      design name
    required: true
  - name: imageDataUrl
    type: string
    description: data:image/png;base64 payload from Canva, streamed to Vercel Blob
    required: true
  - name: sectionId
    type: string
    description: Optional board section CUID; null = board default freeform section
    required: true
  - name: cardId
    type: string
    description: CUID of created Card entity returned in response
    required: true
  - name: cardUrl
    type: string
    description: Absolute URL https://aura-board-app.vercel.app/board/<slug>#c/<cardId>
      returned in response
    required: true
  - name: cardWidth
    type: number
    description: Default width 240 assigned at creation
    required: true
  - name: cardHeight
    type: number
    description: Default height 160 assigned at creation
    required: true
  - name: blobUrl
    type: string
    description: Vercel Blob storage URL for uploaded image, stored internally not
      exposed in response
    required: true
  - name: tierStatus
    type: string
    description: Pro or Free — determines cards:write issuance eligibility and 402
      gate
    required: true
evaluation_principles:
- name: security
  description: PAT secret never persisted in plaintext; hash+pepper only; 1-time reveal;
    no recovery path; legacy revoke on migration
  weight: 0.35
- name: performance
  description: p95 upload < 2000ms via streaming blob put; no full-body buffering;
    4MB early guard prevents Vercel timeout
  weight: 0.2
- name: schema_strictness
  description: Zod strict mode rejects unknown fields; boardId allowlist enforced;
    title length validated; imageDataUrl format validated
  weight: 0.2
- name: minimal_response
  description: Response exposes only {id, url} — no internal fields, no imageUrl,
    no full card object; error schema unified
  weight: 0.15
- name: migration_safety
  description: 3-stage tokenPrefix migration preserves data integrity; legacy rows
    revoked not silently broken; reissuance notice delivered
  weight: 0.1
exit_conditions:
- name: endpoint_functional
  description: POST /api/external/cards is live and returns 200 {id,url} for valid
    Pro-token requests
  criteria: Auth + rate-limit + tier-gate + blob-upload + card-create + response schema
    all pass integration tests
- name: migration_complete
  description: All ExternalAccessToken rows have non-null tokenPrefix after 3-stage
    migration
  criteria: Stage 3 NOT NULL constraint applied without error; legacy rows confirmed
    revoked; reissuance notice sent
- name: security_verified
  description: No plaintext token exists in DB; 1-time modal cannot be reopened
  criteria: tokenHash column verified SHA-256 only; revoke endpoint tested; modal
    state confirmed ephemeral
