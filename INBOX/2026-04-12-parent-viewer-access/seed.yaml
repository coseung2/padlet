goal: Aura-board 플랫폼에 학부모 읽기 전용 뷰어 액세스 기능을 추가한다 — 교사 발급 Crockford Base32 6자리 코드로 페어링
  후 학부모가 스마트폰 PWA(/parent/*)에서 자녀의 그림보드·식물관찰일지·행사 보드·Breakout·숙제를 열람할 수 있으며, 서버 RLS
  + parentScopeMiddleware로 타 학생 PII 완전 격리를 보장한다
task_type: code
brownfield_context:
  project_type: brownfield
  context_references:
  - path: padlet/
    role: reference
    summary: Aura-board 상위 프로젝트 — BoardMember·Student·Teacher·Classroom 기존 모델 및 RLS
      정책 참조
  - path: padlet/prisma/schema.prisma
    role: reference
    summary: BoardMember.role 유니언, Student, Classroom 기존 스키마 — Parent 4종 모델 확장 기준
  - path: tasks/2026-04-12-parent-viewer-access/phase2/sketch.md
    role: primary
    summary: 7개 미결 질문 원본 및 phase1 하이브리드 확정 전제 포함
  existing_patterns:
  - BoardMember.role 유니언 확장 패턴 (teacher/student → parent 추가)
  - SWR 60s 폴링 패턴 (WebSocket 비사용)
  - isPrivate/isSharedToClass/peek-others 가시성 규칙 (Seed 1·3·4·6 승계)
  - Vercel Fluid Compute + Edge Middleware rate limiting 패턴
  - React Email + Resend 이메일 발송 스택
  - Vercel Cron 스케줄 작업 패턴
  - Vercel Blob presigned URL 이미지 서빙 패턴
  existing_dependencies:
  - Prisma ORM with PostgreSQL RLS
  - SWR polling
  - Tailwind CSS breakpoint 반응형
  - Vercel Fluid Compute + Vercel Cron
  - React Email + Resend
  - Vercel Blob
  - upstash redis (Edge Middleware rate limiting)
constraints:
- Smartphone portrait PWA 320~430px iOS Safari / Android Chrome 3G~LTE only
- TTI < 2s LTE / < 3s 3G, first viewport < 500KB, thumbnail < 200KB
- iframe 금지 — proxy thumbnail only
- WebSocket 비활성 — SWR polling 60s
- BoardMember.role="parent" read-only, v1 순수 read-only (댓글·좋아요 v2+ 파킹)
- 'Scope isolation: studentId ∈ parent.children 서버 미들웨어 + RLS 강제'
- Soft delete only — ParentChildLink hard delete 금지
- Revoke SLA ≤ 60s (revokedAt IS NOT NULL → 401)
- Crockford Base32 6-digit code 32^6 ≈ 1×10^9, IP 5회/15분 rate limit, 코드당 10회 실패 시
  즉시 만료
- Magic link 인증 전용 (비밀번호 없음), 세션 7일 유효
- 학부모 1인당 자녀 수 상한 5명 tier 무관
- 'Free tier: in-app badge only + invite 2명/자녀'
- 'Pro tier: 주간 이메일 요약 + invite 5명/자녀'
- 타 학생 사진 API 필터링(1차) + DOM 마스킹(보조) 이중 적용
- '학부모 간 격리: RLS parent_id = auth.uid() 단방향 조회만 허용'
acceptance_criteria:
- 교사가 학생 카드에서 Crockford Base32 Parent Code + QR 코드를 발급할 수 있다
- 학부모가 코드 입력 후 매직 링크 이메일로 계정 생성 및 인증에 성공한다
- /parent/* 라우트에서 자녀의 그림보드·식물관찰일지·행사 보드·Breakout·숙제를 열람할 수 있다
- parentScopeMiddleware가 모든 /parent/* API 엔드포인트에 적용되어 studentId 귀속 검증을 수행한다
- parent 토큰으로 타 학생 studentId API 직접 호출 시 403 반환 (E2E 테스트 필수)
- parentA 토큰으로 parentB의 ParentChildLink 조회 시도 시 404 반환 (E2E 테스트 필수)
- 교사 1-click revoke 후 ≤ 60s 이내 해당 학부모 세션이 차단된다
- 학부모 클라이언트가 401 수신 시 자동 로그아웃 후 "접근이 해제되었습니다" 화면으로 전환된다
- Pro 학부모에게 매주 월요일 09:00 KST 주간 활동 요약 이메일이 발송된다 (활동 0건 주 스킵)
- 학부모 탈퇴 시 soft delete 처리되고 90일 후 PII가 익명화된다
- PWA 설치 가능 (/parent/* manifest 포함)
- 코드 48h 만료 또는 maxUses 3 소진 후 학생 카드에서 재발급 버튼이 노출된다
- EventBoard API는 classroomId 기준 조회를 허용하되 타 학생 EventSignup 레코드를 응답에서 제거한다
- Breakout API는 session.studentId ∈ parent.children 검증 후 반환한다
ontology_schema:
  name: ParentViewerAccess
  description: 학부모 읽기 전용 액세스를 위한 도메인 모델 — 학부모 계정, 학부모-자녀 N:M 링크, Crockford Base32
    초대 코드, 매직 링크 세션, 주간 이메일 수신 설정을 포함하며 기존 BoardMember·Student·Teacher·Classroom Prisma
    모델과 연동됨
  fields:
  - name: parentId
    type: string
    description: 학부모 고유 식별자
    required: true
  - name: parentEmail
    type: string
    description: 매직 링크 발송 대상 이메일 (탈퇴 90일 후 SHA-256 해시로 익명화)
    required: true
  - name: parentDisplayName
    type: string
    description: 학부모 표시 이름 (탈퇴 후 "탈퇴한 학부모"로 대체)
    required: true
  - name: parentRevokedAt
    type: string
    description: 교사 철회 또는 탈퇴 처리 시 소프트 삭제 타임스탬프
    required: true
  - name: parentDeletedAt
    type: string
    description: 학부모 본인 탈퇴 요청 타임스탬프 (90일 익명화 배치 기준)
    required: true
  - name: parentEmailSummaryOptOut
    type: boolean
    description: 주간 이메일 요약 수신 거부 플래그 (default false)
    required: true
  - name: parentChildLinkId
    type: string
    description: Parent-Student N:M 연결 고유 식별자
    required: true
  - name: parentChildLinkStudentId
    type: string
    description: 연결된 학생 ID (RLS 필터 기준 키)
    required: true
  - name: parentChildLinkStatus
    type: string
    description: 링크 상태 (active / revoked)
    required: true
  - name: parentChildLinkRevokedReason
    type: string
    description: 철회 사유 (teacher_action / self_withdraw)
    required: true
  - name: parentChildLinkIssuedById
    type: string
    description: 발급한 교사 ID (감사 로그 필드)
    required: true
  - name: parentChildLinkDeletedAt
    type: string
    description: 소프트 삭제 타임스탬프
    required: true
  - name: inviteCode
    type: string
    description: Crockford Base32 6자리 초대 코드 (crypto.randomBytes CSPRNG 생성)
    required: true
  - name: inviteCodeStudentId
    type: string
    description: 코드가 발급된 학생 ID
    required: true
  - name: inviteCodeExpiresAt
    type: string
    description: 코드 만료 시각 (발급 후 48h)
    required: true
  - name: inviteCodeMaxUses
    type: number
    description: 최대 사용 횟수 (default 3)
    required: true
  - name: inviteCodeUsedCount
    type: number
    description: 실제 사용 횟수
    required: true
  - name: inviteCodeFailedAttempts
    type: number
    description: 실패 시도 횟수 (10회 초과 시 코드 즉시 만료)
    required: true
  - name: parentSessionToken
    type: string
    description: 매직 링크 인증 후 발급된 세션 토큰
    required: true
  - name: parentSessionExpiresAt
    type: string
    description: 세션 만료 시각 (7일)
    required: true
  - name: parentSessionRevokedAt
    type: string
    description: 세션 강제 무효화 타임스탬프 (revoke 즉시 SET)
    required: true
  - name: boardMemberRole
    type: string
    description: BoardMember 역할 유니언 (teacher / student / parent)
    required: true
evaluation_principles:
- name: security
  description: API 필터링 1차 방어 + DOM 마스킹 보조 + RLS 정책으로 타 학생 PII 유출 0건 달성 여부
  weight: 0.3
- name: privacy_isolation
  description: 학부모 간 단방향 격리(RLS parent_id = auth.uid()) 및 복수 학부모 신원 상호 비노출 달성 여부
  weight: 0.25
- name: performance
  description: TTI < 2s LTE / < 3s 3G 및 첫 뷰포트 < 500KB 예산 준수 여부
  weight: 0.2
- name: auditability
  description: 감사 로그(issuedById·revokedReason·revokedAt) 완비 및 양육권 분쟁 시 접근 이력 증빙 가능
    여부
  weight: 0.15
- name: ux_frictionless
  description: 320~430px 환경에서 매직 링크 인증·PWA 설치·자녀 활동 열람 플로우 마찰 최소화 여부
  weight: 0.1
exit_conditions:
- name: ambiguity_resolved
  description: Q1~Q8 및 모든 파생 항목 해소 완료 — 측정 ambiguity ≈ 0.15
  criteria: ambiguity ≤ 0.20 달성 확인
- name: scope_frozen
  description: v1 포함 항목과 v2+ 파킹 항목(좋아요·실시간 push·Kakao 알림톡·Quiz 점수)이 명시적으로 구분됨
  criteria: v1/v2 경계 문서화 완료
- name: e2e_coverage
  description: 보안 핵심 경로 E2E 테스트 케이스 정의 완료
  criteria: 403(타 학생 API 직접 호출), 404(타 학부모 링크 조회), ≤60s revoke SLA, IP rate limit
    15분 잠금 케이스 모두 포함
- name: prisma_schema_ready
  description: 신규 4종 모델(Parent / ParentChildLink / ParentInviteCode / ParentSession)
    + 모든 파생 필드 확정
  criteria: 모든 필드 타입·제약·인덱스 명세 완비
