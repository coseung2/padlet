# ============================================================
# supplemental_overlay — phase3 decisions.md 반영 보강
# MCP가 자동 시드에서 축약/누락한 결정사항을 구조화하여 병합.
# phase5 integrator는 본 overlay를 acceptance_criteria와 동격으로 취급.
# ============================================================
supplemental_overlay:
  parent_seed_id: seed_37b35654542f
  chain_rationale: |
    본 시드(seed_6d7077aac472)는 학부모 뷰어 v1 원시드(seed_37b35654542f)를
    완전 대체(학생 1:코드 1 → 학급 1:코드 1 + 셀프매칭 + 승인 게이트).
    v1 시드는 읽기 전용 역사로 보존, v2가 활성 스펙.
    마이그레이션: 미배포 상태이므로 완전 폐기 즉시 전환(D-46).

  status_state_machine:
    values: [pending, active, rejected, revoked]
    transitions:
      - from: "(none)"
        to: pending
        trigger: "학부모 학급 코드 가입 + 명단에서 자녀 선택 (signup)"
      - from: pending
        to: active
        trigger: "교사 승인 클릭 (approve)"
        side_effects: ["BoardMember 생성", "학부모 콘텐츠 접근 활성"]
      - from: pending
        to: rejected
        trigger: "교사 능동 거부 (reject with reason)"
        reasons_allowed: [wrong_child, not_parent, other]
        revokedReason_value: rejected_by_teacher
      - from: pending
        to: rejected
        trigger: "Cron 7일 초과 자동 만료"
        revokedReason_value: auto_expired_pending
      - from: pending
        to: rejected
        trigger: "ClassInviteCode 회전 이벤트"
        revokedReason_value: code_rotated
      - from: active
        to: revoked
        trigger: "교사 revoke 또는 학년 종료"
        sla: "<=60s"

  revokedReason_enum_v2:
    - rejected_by_teacher     # D-05 신규
    - auto_expired_pending    # D-05 신규
    - code_rotated            # D-05 신규
    - teacher_revoked         # v1 유지
    - year_end                # v1 유지
    - parent_self_leave       # v1 유지

  teacher_ui_spec:
    location: "학급 설정 > 학부모 액세스 탭"
    sections:
      - name: "초대 코드"
        widgets: [현재코드표시, QR/링크복사, 회전버튼, 회전히스토리]
      - name: "승인 인박스"
        widgets: [pending리스트(D+N일자배지), 일괄승인, 개별승인/거부(사유드롭다운), 검색]
        badges:
          - "D+0~2: 정상(회색)"
          - "D+3~5: 주의(노랑)"
          - "D+6: 경고(빨강) + 24h 만료예고"
      - name: "연결된 학부모"
        widgets: [학부모-자녀쌍목록, revoke버튼, 최근접속일]
    removed_from_v1:
      - "학생 카드 드롭다운의 '학부모 초대' 항목 (D-35)"
      - "학생별 코드 발급 UI (v1 경로는 읽기 전용 history 페이지로만 잔존)"

  approval_sla_schedule:
    recommended_response_window: "24h (비강제, 교사 안내 문구)"
    auto_expiry: "7d (강제, Cron 실행)"
    reminder_D3:
      channel: email
      subject_pattern: "[Aura-board] {N}명의 학부모가 승인 대기 중입니다"
      trigger: "pending.createdAt + 3d"
    warning_D6:
      channel: email
      subject_pattern: "[Aura-board] 24시간 후 자동 만료 예정 ({N}건)"
      trigger: "pending.createdAt + 6d"
    expiry_summary_D7:
      channel: email
      subject_pattern: "[Aura-board] {N}건이 자동 만료되었습니다"
      trigger: "cron run after auto_expired_pending 처리"
    cron:
      schedule: "0 17 * * *  # UTC 17:00 = KST 02:00"
      frequency: "일 1회"
      runtime: "Vercel Cron"

  self_matching_student_list:
    visible_fields: [반(class_no), 번호(student_no), 마스킹이름(masked_name)]
    masked_name_rule: "성 + 'O' + 끝글자 (예: 김O민, 박O). 2자 이름은 '김O'."
    hidden_fields: [full_name, phone, address, birthdate, 모든 PII]
    sorting: "반 오름차순 → 번호 오름차순"
    filter: "현재 학급만 (타 학급 학생 불가시)"
    rate_limit: "학급당 조회 100회/일 (코드 brute-force 방어와 동일 풀)"

  rejection_email_templates:
    common_rules:
      - "교사 이름·이메일·전화번호 미노출 (학교 대표 연락처만)"
      - "재신청 deep link 포함 (signup 초기화 flow)"
      - "선택된 reason 문구만 본문에 삽입"
    reasons:
      wrong_child:
        tone: "선택한 학생이 해당 학부모의 자녀가 아닌 것으로 확인되었습니다. 자녀 정보를 다시 확인 후 재신청해 주세요."
      not_parent:
        tone: "신청자가 법적 보호자가 아닌 것으로 확인되었습니다. 보호자 본인이 직접 신청해 주세요."
      other:
        tone: "승인이 어려워 거부되었습니다. 자세한 사유는 학교로 문의해 주세요."
    auto_expired_template: |
      "7일간 승인이 이루어지지 않아 신청이 자동 만료되었습니다.
       여전히 자녀 계정 열람이 필요하시면 아래 링크에서 재신청해 주세요."
    cooldown: "동일 학부모 이메일 거부 3회 초과 시 24시간 재신청 차단"

  migration_strategy:
    decision: "완전 폐기 즉시 전환 (D-46)"
    rationale: "v1 학부모 뷰어는 미배포 상태. 실사용 학부모 없음 → 데이터 마이그 불필요."
    actions:
      - "v1 Student.parentInviteCode 컬럼 deprecate 표시 (삭제 X, 읽기전용)"
      - "v1 발급 UI 제거 (D-35)"
      - "신규 API /api/parent/signup은 v2 전용 (ClassInviteCode 기반)"
      - "v1 엔드포인트는 410 Gone 반환 (호출 없음 가정)"

  retained_from_v1:
    - magiclink_ttl_15min
    - parent_session_ttl_7d
    - max_children_per_parent_5
    - bcc_forbidden
    - content_isolation_triple_layer  # API + DOM mask + RLS
    - revoke_sla_60s
    - child_scope_matrix  # 자녀별 열람 범위 동일 정책
    - crockford_base32_csprng_code_gen  # 코드 포맷은 재사용
    - pro_tier_weekly_email_mon_0900_kst
    - soft_delete_90d_anonymize

  decisions_coverage:
    total: 72
    breakdown:
      D-01_to_D-50: 50
      user_proxy: 4
      E-01_to_E-05: 5
      retained_v1: 13
    source: "tasks/2026-04-13-parent-class-invite-refine/phase3/decisions.md"

  out_of_scope_v2:
    - "교사 자유 메시지 입력 (거부 이메일에 커스텀 문구 첨부 불가)"
    - "에스컬레이션 경로 (1인 개발자 운영, 운영 콜센터 없음)"
    - "학부모 앱 (웹 모바일만)"
    - "부/모 합산 권한 통합 (각각 별도 승인 유지)"

  handoff:
    destination: padlet
    target_feature: "parent-viewer v2"
    target_module: "padlet/apps/web/features/parent-access/"
    phase0_request_target: "padlet/INBOX/"
