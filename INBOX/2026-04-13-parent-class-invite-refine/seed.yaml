goal: Aura-board 학부모 페어링 v2 구현 — 학급 단위 단일 초대 코드 + 학부모 셀프매칭(학급 명단에서 자녀 선택) + 교사 승인
  게이트로 기존 학생 1:코드 1 모델을 대체하여 교사 운영 부담을 제거하고 사칭 차단 보안을 유지하는 학부모 액세스 시스템 구축
task_type: code
brownfield_context:
  project_type: brownfield
  context_references:
  - path: seed_37b35654542f
    role: primary
    summary: 2026-04-12 생성된 학부모 뷰어 v1 시드 — 학생 1:코드 1 모델, 매직링크·ParentSession·콘텐츠 격리
      3중·Revoke SLA 등 유지 결정사항의 원본
  existing_patterns:
  - Crockford Base32 + CSPRNG 코드 생성 패턴
  - 매직링크(이메일 OTP) 15분 유효 인증 플로우
  - ParentSession 7일 TTL 세션 관리
  - RLS 기반 콘텐츠 격리 + API 필터 + DOM 마스킹 3중 격리
  - Revoke ≤60초 SLA 즉시 무효화 패턴
  - Pro tier 주간 이메일 스케줄(월 09:00 KST)
  - v1 읽기 전용 보존 원칙
  existing_dependencies:
  - Vercel Cron(일 1회 KST 02:00 pending 스캔)
  - 이메일 발송 서비스(매직링크·거부 안내·교사 알림)
  - Prisma ORM(@@unique 제약·enum 타입)
  - RLS 지원 DB(Supabase 추정)
  - parent_seed_id = seed_37b35654542f 시드 체인
constraints:
- 매직링크(이메일 OTP) 유효시간 15분
- ParentSession TTL 7일
- 학부모 1인당 자녀 연결 최대 5명
- 학부모 간 BCC 금지·이름 비노출
- 콘텐츠 격리 3중(API 필터 + DOM 마스킹 + RLS)
- '코드 생성: Crockford Base32 8자리 + CSPRNG'
- Revoke SLA ≤60초
- TTI <2s on LTE
- 주간 이메일 Pro tier 월요일 09:00 KST
- v1(학생별 코드) 읽기 전용 유지
- IP rate limit 5회/15분 + 코드당 50회/일 + 학급당 100회/일
- 동시 pending 상한 학부모당 3건
- pending TTL 7일
- 거부 이메일에 교사 이름·연락처 비노출
- 거부 3회 초과 시 해당 이메일 24시간 쿨다운
- 교사 자유 메시지 입력 미제공(v1)
- 에스컬레이션 경로 없음(1인 개발자 운영)
- parent_seed_id = seed_37b35654542f 체인 유지
acceptance_criteria:
- ClassInviteCode 엔티티 신설 — 학급당 단일 코드 발급 및 관리 가능
- 학부모가 학급 코드로 가입 후 명단(반·번호·이름 첫 글자 마스킹 형식 "3반 12번 김O민")에서 자녀 선택 가능
- ParentChildLink.status가 pending→active→rejected→revoked 4값 전이 머신으로 동작
- 교사 UI "학부모 액세스" 탭에 초대 코드/승인 인박스/연결된 학부모 3섹션 표시
- 동일 자녀에 부·모 각각 별도 승인 가능(@@unique([parentId, studentId]) 제약만 적용)
- ParentSession은 signup 시점 생성, BoardMember는 approve 시점 생성
- pending 상태 응답은 HTTP 200 OK + {"status":"pending"} payload 반환
- Vercel Cron KST 02:00 일 1회 실행으로 pending 7일 초과 건 auto_expired_pending으로 자동 만료 처리
- D+3 교사 리마인더 이메일 발송(N명 대기 중)
- D+6 교사 최종 경고 이메일 발송(24시간 후 만료 예고)
- D+7 만료 실행 시 교사 요약 이메일 발송
- 교사 능동 거부 시 wrong_child/not_parent/other 3종 드롭다운 선택 가능
- rejected_by_teacher 이메일에 선택된 사유 문구 포함 + 재신청 deep link 포함
- auto_expired_pending 이메일에 고정 문구 + 재신청 deep link 포함
- code_rotated 이벤트 발생 시 해당 학급 pending 건 일괄 rejected 처리
- 공수 증분 +6~7일(총 33~34일) 범위 내 완료
ontology_schema:
  name: ParentPairingV2Domain
  description: Aura-board 학부모 페어링 v2의 핵심 도메인 모델 — 학급 단위 초대 코드, 학부모-자녀 연결 상태 전이, 교사
    승인 게이트, 거부 사유 및 알림 스케줄을 포괄하는 데이터 구조
  fields:
  - name: classInviteCode
    type: string
    description: Crockford Base32 8자리 CSPRNG 생성 학급 단위 단일 초대 코드
    required: true
  - name: classId
    type: string
    description: 초대 코드가 귀속된 학급 식별자
    required: true
  - name: parentId
    type: string
    description: 가입한 학부모의 고유 식별자
    required: true
  - name: studentId
    type: string
    description: 학부모가 셀프매칭으로 선택한 학생 식별자
    required: true
  - name: parentChildLinkStatus
    type: string
    description: pending
    required: true
  - name: rejectedReason
    type: string
    description: wrong_child
    required: true
  - name: parentSessionCreatedAt
    type: string
    description: 학부모 signup 시점 ParentSession 생성 타임스탬프
    required: true
  - name: boardMemberCreatedAt
    type: string
    description: 교사 approve 시점 BoardMember 생성 타임스탬프
    required: true
  - name: pendingExpiredAt
    type: string
    description: pending 상태 만료 기준 타임스탬프(생성+7일)
    required: true
  - name: pendingCountPerParent
    type: number
    description: 학부모당 동시 pending 건수(상한 3건)
    required: true
  - name: studentDisplayMasked
    type: string
    description: 명단 표시용 마스킹 문자열 형식("3반 12번 김O민")
    required: true
  - name: rejectionEmailCount
    type: number
    description: 학부모 이메일별 거부 이메일 누적 횟수(3회 초과 시 24h 쿨다운)
    required: true
  - name: codeRotatedAt
    type: string
    description: ClassInviteCode 회전 발생 타임스탬프(회전 시 pending 일괄 rejected)
    required: true
  - name: teacherNotificationSchedule
    type: object
    description: D+0 배지/D+3 리마인더/D+6 경고/D+7 요약 이메일 알림 스케줄
    required: true
  - name: parentSeedId
    type: string
    description: 상위 seed 체인 참조값(seed_37b35654542f)
    required: true
evaluation_principles:
- name: security_integrity
  description: 학급 코드 브루트포스 방어·PII 최소 노출·사칭 차단 게이트가 모두 구현되었는가
  weight: 0.3
- name: ux_teacher_burden
  description: 교사의 코드 발급 부담이 학생 수 → 1로 감소하고 승인 인박스 UI가 명확하게 구현되었는가
  weight: 0.25
- name: state_machine_correctness
  description: ParentChildLink 4값 전이가 모든 시나리오(능동 거부·자동 만료·회전)에서 올바르게 동작하는가
  weight: 0.2
- name: notification_reliability
  description: 교사 알림 스케줄(D+0/D+3/D+6/D+7)과 학부모 거부 이메일이 누락 없이 발송되는가
  weight: 0.15
- name: v1_compatibility
  description: v1 학생별 코드가 읽기 전용으로 유지되며 데이터 마이그레이션 없이 공존하는가
  weight: 0.1
exit_conditions:
- name: ambiguity_resolved
  description: 인터뷰 미결 4개 항목(SLA·거부 톤·명단 노출·마이그레이션) 중 확정된 2개(SLA·거부 톤)가 스펙에 반영되고 ambiguity
    ≤ 0.2 달성
  criteria: ambiguity_score <= 0.2
- name: decisions_md_generated
  description: 모든 확정 결정사항이 decisions.md로 산출됨
  criteria: 파일 존재 + 필드 완비
- name: seed_chain_maintained
  description: parent_seed_id = seed_37b35654542f가 새 시드에 명시됨
  criteria: 필드 존재 및 값 일치
- name: remaining_items_parked
  description: 셀프매칭 명단 노출 범위·마이그레이션 전략이 v2 파킹 또는 별도 인터뷰로 이관됨
  criteria: 파킹 처리 기록 존재
