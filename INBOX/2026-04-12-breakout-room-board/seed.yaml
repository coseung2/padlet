goal: Aura-board 플랫폼에 Breakout Room 기능을 설계한다 — BreakoutTemplate·BreakoutAssignment
  두 엔티티를 신설하고, 갤럭시 탭 S6 Lite 기준 3배포모드·3열람모드·7종 시스템 템플릿(Free 3 + Pro 4)·모둠별 독립 복사 모델을
  확정 스펙으로 구현한다
task_type: code
brownfield_context:
  project_type: brownfield
  context_references:
  - path: ../padlet/
    role: reference
    summary: Aura-board 상위 프로젝트 — Section 엔티티·Board 엔티티·AssetAttachment 복사 패턴 참조(읽기
      전용)
  - path: plans/drawing-board-library-roadmap.md
    role: reference
    summary: AssetAttachment 복사 패턴 — BreakoutTemplate 복사 방식 설계 근거
  existing_patterns:
  - Section 엔티티 재활용(BreakoutGroup 신설 금지)
  - AssetAttachment 복사 패턴 — 원본 수정 시 파생본 역전파 없음
  - teacher-pool 섹션은 보드 레벨 단일 섹션으로 공유
  - 반 공개(isPublic=true) 기본값
  existing_dependencies:
  - Section 엔티티
  - Board 엔티티
  - 기존 Free/Pro Tier 결제 시스템(Free 5반·Pro 월₩9,900)
constraints:
- 기준 디바이스 갤럭시 탭 S6 Lite(Chrome Android + S-Pen) — 태블릿 성능 최우선
- Section 엔티티 재활용(BreakoutGroup 신설 금지)
- '신규 엔티티 2종만 추가: BreakoutTemplate·BreakoutAssignment'
- v1 학생 모둠 이동 불허 — 교사 재배정만 허용
- 템플릿 복제는 복사 방식 — 모둠별 독립 복사본 유지(역전파 없음)
- teacher-pool 섹션은 보드 레벨 단일 공유 섹션으로만 존재
- 'Free Tier: 반 5개 상한·시스템 템플릿 3종·커스텀 템플릿 3개'
- 'Pro Tier: 월 ₩9,900·반 무제한·시스템 템플릿 전체·커스텀 무제한·학교 공용 등록'
- 월드카페 템플릿 v2 파킹 — v1 미포함
- 모든 템플릿에서 교사 전체 접근 권한 항상 보장
acceptance_criteria:
- BreakoutTemplate 엔티티에 id·name·tier·structure·recommendedVisibility·defaultGroupCount·defaultGroupCapacity
  필드가 존재한다
- BreakoutAssignment 엔티티에 id·boardId·templateId·deployMode·groupCount·groupCapacity·visibilityOverride·status
  필드가 존재한다
- 배포모드 3종(link-fixed·self-select·teacher-assign)이 모두 동작한다
- 열람모드 2종(own-only·peek-others)이 학생 기준으로 적용되며 교사는 항상 전체 접근 가능하다
- '모둠 기본값: 4모둠·정원 6명·상한 10모둠이 BreakoutAssignment 생성 시 기본 적용된다'
- v1 시스템 템플릿 7종(KWL 차트·브레인스토밍·아이스브레이커·찬반 토론·Jigsaw·모둠 발표 준비·갤러리 워크) + Pro 예비 1종(6색
  모자) 총 8종이 등록된다
- Free 3종(KWL·브레인스토밍·아이스브레이커)은 Free Tier에서 접근 가능하고 나머지 5종은 Pro 전용이다
- 템플릿별 recommendedVisibility가 own-only 5종(KWL·브레인스토밍·찬반 토론·Jigsaw·아이스브레이커)·peek-others
  2종(갤러리 워크·모둠 발표 준비)으로 설정된다
- 교사가 한 모둠 섹션을 수정해도 다른 모둠 복사본에 영향 없다
- 교사 UI에 "모든 모둠에 이 카드 복제" 단발 액션 버튼이 존재한다
- 템플릿 원본 수정이 기존 Board에 역전파되지 않는다
- 반 공개(public) 기본값이 적용된다
ontology_schema:
  name: BreakoutRoomDomain
  description: Aura-board Breakout Room 기능의 핵심 도메인 모델 — 교사가 모둠 협력학습 보드를 템플릿 기반으로 개설·배포·관리하는
    구조를 기술한다
  fields:
  - name: BreakoutTemplate.id
    type: string
    description: 템플릿 고유 식별자
    required: true
  - name: BreakoutTemplate.name
    type: string
    description: 템플릿 이름(KWL 차트 등)
    required: true
  - name: BreakoutTemplate.tier
    type: string
    description: 접근 가능 Tier(free
    required: true
  - name: BreakoutTemplate.structure
    type: array
    description: 섹션 구조 정의 배열(복사 원본)
    required: true
  - name: BreakoutTemplate.recommendedVisibility
    type: string
    description: 학생 기준 권장 열람 모드(own-only
    required: true
  - name: BreakoutTemplate.defaultGroupCount
    type: number
    description: 기본 모둠 수(기본값 4)
    required: true
  - name: BreakoutTemplate.defaultGroupCapacity
    type: number
    description: 모둠당 기본 정원(기본값 6)
    required: true
  - name: BreakoutTemplate.maxGroupCount
    type: number
    description: 모둠 수 상한(기본값 10)
    required: true
  - name: BreakoutTemplate.version
    type: number
    description: 템플릿 버전 — 새 Board 개설 시점에만 적용
    required: true
  - name: BreakoutAssignment.id
    type: string
    description: 수업 인스턴스 고유 식별자
    required: true
  - name: BreakoutAssignment.boardId
    type: string
    description: 연결된 Board ID
    required: true
  - name: BreakoutAssignment.templateId
    type: string
    description: 파생 원본 BreakoutTemplate ID
    required: true
  - name: BreakoutAssignment.deployMode
    type: string
    description: 배포 모드(link-fixed
    required: true
  - name: BreakoutAssignment.groupCount
    type: number
    description: 실제 생성 모둠 수
    required: true
  - name: BreakoutAssignment.groupCapacity
    type: number
    description: 모둠당 정원
    required: true
  - name: BreakoutAssignment.visibilityOverride
    type: string
    description: 교사 override 열람 모드(own-only
    required: true
  - name: BreakoutAssignment.status
    type: string
    description: 수업 상태(draft
    required: true
  - name: BreakoutAssignment.isPublic
    type: boolean
    description: 반 공개 여부(기본값 true)
    required: true
  - name: GroupSection.id
    type: string
    description: 모둠별 독립 복사 섹션 ID
    required: true
  - name: GroupSection.assignmentId
    type: string
    description: 소속 BreakoutAssignment ID
    required: true
  - name: GroupSection.groupIndex
    type: number
    description: 모둠 번호
    required: true
  - name: GroupSection.role
    type: string
    description: 섹션 역할(student-copy
    required: true
  - name: GroupSection.cards
    type: array
    description: 섹션 내 카드 목록(독립 복사본)
    required: true
evaluation_principles:
- name: 독립성
  description: 모둠 간 작업 공간이 완전히 격리되어 한 모둠의 변경이 다른 모둠에 영향을 주지 않는다
  weight: 0.3
- name: 태블릿최적화
  description: 갤럭시 탭 S6 Lite에서 렉 없이 동작하며 S-Pen 인터랙션이 자연스럽다
  weight: 0.25
- name: 교사제어
  description: 교사가 배포모드·열람모드·모둠 구성을 개설 시 및 수업 중 언제든 제어할 수 있다
  weight: 0.2
- name: 티어전환유인
  description: Free 3종이 첫 수업 성공 경험을 제공하고 Pro 5종이 체감 가치를 명확히 차별화한다
  weight: 0.15
- name: 예측가능성
  description: 템플릿 역전파 없음·명시적 단발 복제 액션 등 교사가 변경 영향 범위를 예측할 수 있다
  weight: 0.1
exit_conditions:
- name: 스펙완비
  description: BreakoutTemplate·BreakoutAssignment 두 엔티티의 모든 필드와 관계가 ambiguity ≤ 0.2
    수준으로 정의됨
  criteria: 모든 ACCEPTANCE_CRITERIA 항목 통과
- name: v1스코프확정
  description: v1 포함 7종 + Pro예비 1종(6색모자) 확정, 월드카페 v2 파킹 문서화 완료
  criteria: 월드카페가 v2 파킹 목록에 기록되고 v1 구현 범위에서 제외
- name: 미결없음
  description: Q1~Q7 전 항목이 확정 답변으로 닫힘
  criteria: 잔여 open question 0건
